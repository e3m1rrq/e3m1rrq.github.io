  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #container {
      position: relative;
    }

    #image {
      position: fixed;
      bottom: 0px;
      right: 0px;
      height: 100px;
      width: 100px;
      cursor: pointer;
      transition: transform 0.3s ease-in-out;
    }

    #image:hover {
      transform: scale(1.1);
    }

    #overlay {
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      bottom: 0;
      background: rgba(5, 22, 26, 0.7); 
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Lucida Console", Monaco, monospace;
      font-size: 25px;
      display: none;
    }

    #overlay a {
      color: #00f; /* Link rengini mavi olarak değiştirin (veya istediğiniz başka bir renk) */
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="container">
  <img id="image" src="kedii.png" alt="Görsel">
  <div id="overlay">Made By <a href="https://www.instagram.com/em1r.json" target="_blank">@em1r.json</a></div>
</div>

<script>
  const image = document.getElementById('image');
  const overlay = document.getElementById('overlay');

  image.addEventListener('click', () => {
    overlay.style.display = 'flex';
  });

  overlay.addEventListener('click', () => {
    overlay.style.display = 'none';
  });
</script>
